<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutina Semanal - FitTrack</title>
    <link rel="stylesheet" href="../estilos.css">
</head>
<body style="background:#f4f6f8;">
    <nav class="navbar" style="background:#000;">
        <div class="logo">
            <a href="main.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;">
            <img src="../img/logo gym.png" alt="Logo" style="width:3.5rem;height:auto;">
            <span>FitTrack</span>
            </a>
        </div>
        <ul class="nav-menu">
            <li><a href="calendario.html">Calendario</a></li>
            <li><a href="rutina.html">Rutina Semanal</a></li>
        </ul>
        <button class="btn-dark-mode" id="btn-dark-mode" title="Modo oscuro"><img src="../img/luna.png" alt="Modo oscuro" style="width:1.2rem;height:1.2rem;display:block;"></button>
    </nav>

    <!-- Header negro -->
    <div class="rutina-hero">
        <div class="rutina-hero-left">
            <a href="main.html" class="rutina-volver">&larr; Volver al inicio</a>
            <div class="rutina-hero-titulo-row">
                <h1 class="rutina-hero-titulo">Mi Rutina Semanal</h1>
            </div>
            <p class="rutina-hero-sub">Diseña tu semana de entrenamiento perfecta</p>
            <div class="rutina-hero-btns">
                <button class="rutina-btn-guardar" id="rutina-btn-guardar">&#128190; Guardar rutina</button>
                <button class="rutina-btn-reset" id="rutina-btn-reset">&#8635; Resetear</button>
            </div>
        </div>
        <div class="rutina-hero-stats">
            <div class="rutina-stat">
                <span class="rutina-stat-num" id="stat-activos">0</span>
                <span class="rutina-stat-label">días activos</span>
            </div>
            <div class="rutina-stat">
                <span class="rutina-stat-num" id="stat-ejercicios">0</span>
                <span class="rutina-stat-label">ejercicios</span>
            </div>
            <div class="rutina-stat">
                <span class="rutina-stat-num" id="stat-minutos">0</span>
                <span class="rutina-stat-label">minutos</span>
            </div>
        </div>
    </div>

    <main class="rutina-main">
        <div class="rutina-container" id="rutina-container"></div>
    </main>

    <!-- Modal agregar/editar ejercicio -->
    <div class="rutina-modal-overlay" id="rutina-modal">
        <div class="rutina-modal">
            <h3 class="modal-titulo" id="modal-titulo">Agregar ejercicio</h3>
            <div class="modal-campo">
                <label>Nombre</label>
                <input type="text" id="modal-nombre" placeholder="Ej: Press de banca">
            </div>
            <div class="modal-campo">
                <label>Tipo</label>
                <select id="modal-tipo">
                    <option>Fuerza</option>
                    <option>Cardio</option>
                    <option>HIIT</option>
                    <option>Yoga</option>
                    <option>Ciclismo</option>
                    <option>Descanso</option>
                    <option>Otro</option>
                </select>
            </div>
            <div class="modal-campo">
                <label>Series / Reps</label>
                <input type="text" id="modal-series" placeholder="Ej: 4×10 o 40min">
            </div>
            <div class="modal-campo">
                <label>Tiempo estimado</label>
                <input type="text" id="modal-tiempo" placeholder="Ej: 20min">
            </div>
            <div class="modal-campo">
                <label>Nota (opcional)</label>
                <input type="text" id="modal-nota" placeholder="Ej: Cuidar la espalda">
            </div>
            <div class="modal-botones">
                <button class="modal-btn-cancelar" id="modal-cancelar">Cancelar</button>
                <button class="modal-btn-guardar" id="modal-guardar">Guardar</button>
            </div>
        </div>
    </div>

    <script src="rutina.js"></script>
    <footer class="footer-cal">
        <p>¿Consultas o sugerencias? <a href="mailto:martinezluca446@gmail.com">martinezluca446@gmail.com</a></p>
    </footer>
</body>
</html>
